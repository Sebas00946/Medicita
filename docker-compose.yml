version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medicita-db
    environment:
      POSTGRES_USER: medicita
      POSTGRES_PASSWORD: Medicita2026!
      POSTGRES_DB: medicita_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/src/database/init-data.sql:/docker-entrypoint-initdb.d/2-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicita -d medicita_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicita-backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medicita_db
      DB_USER: medicita
      DB_PASSWORD: Medicita2026!
      JWT_SECRET: MediCita2026_SuperSecretoJWT_CambiarEnProduccion
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
